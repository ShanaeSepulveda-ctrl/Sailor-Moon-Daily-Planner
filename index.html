<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌙 My Magical Y2K Sanctuary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=VT323&display=swap" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #2b1055, #752273, #ffb6c1); min-height: 100vh; overflow-x: hidden; font-family: 'VT323', monospace; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .pda-bezel { background: #1a1a1a; border: 12px solid #333; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .boombox-3d { background: #444; border-radius: 20px; border: 6px solid #666; box-shadow: 10px 10px 0 #222; }
        .gem-belly { animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { filter: hue-rotate(0deg) brightness(1); } 50% { filter: hue-rotate(90deg) brightness(1.5); } }
        .fairy-dust { position: fixed; width: 4px; height: 4px; background: white; border-radius: 50%; pointer-events: none; }
    </style>
</head>
<body class="p-6 md:p-12 text-white">

    <!-- MAGICAL ROOM LAYOUT -->
    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- COLUMN 1: TECH & SHELF -->
        <div class="space-y-8">
            <!-- 3D Boombox -->
            <div class="boombox-3d p-6">
                <h2 class="text-2xl text-center mb-4 text-pink-300">MOON BEATS</h2>
                <div class="flex justify-center gap-4 mb-6">
                    <button onclick="playMusic(0)" class="w-16 h-10 bg-blue-500 rounded-sm border-2 border-white shadow-inner"></button>
                    <button onclick="playMusic(1)" class="w-16 h-10 bg-pink-500 rounded-sm border-2 border-white shadow-inner"></button>
                    <button onclick="playMusic(2)" class="w-16 h-10 bg-yellow-500 rounded-sm border-2 border-white shadow-inner"></button>
                </div>
                <iframe id="spotify-player" style="border-radius:12px" src="https://open.spotify.com/embed/album/2IevUWpkZ9KUcr6ZhtklE0" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay"></iframe>
            </div>

            <!-- Shelf -->
            <div class="glass p-6 rounded-2xl flex justify-around items-end">
                <div class="text-4xl hover:scale-110 transition">🌈🧸</div>
                <div class="text-4xl gem-belly hover:scale-110 transition">💎👹</div>
            </div>

            <!-- Gameboy -->
            <div class="bg-gray-700 p-4 rounded-xl border-b-8 border-gray-900 inline-block">
                <canvas id="game-screen" width="120" height="100" class="bg-green-200 border-4 border-black"></canvas>
                <div class="mt-4 flex gap-2">
                    <button onclick="alert('Snake Start!')" class="w-8 h-8 rounded-full bg-red-600"></button>
                    <button onclick="alert('Reset!')" class="w-8 h-8 rounded-full bg-blue-600"></button>
                </div>
            </div>
        </div>

        <!-- COLUMN 2 & 3: PDA PLANNER & TAMAGOTCHI -->
        <div class="lg:col-span-2 space-y-8">
            <!-- PDA Planner -->
            <div class="pda-bezel p-8">
                <h1 class="text-2xl text-pink-300 mb-4 text-center">Usagi's Daily Missions</h1>
                <textarea id="daily-sync" class="w-full h-64 bg-black text-green-400 p-4 font-mono rounded-lg border border-green-900" placeholder="Sync your daily brief here..."></textarea>
                <button onclick="syncData()" class="w-full mt-4 bg-pink-500 hover:bg-pink-400 p-3 rounded-full font-bold">SYNC SYNC SYNC! ✨</button>
            </div>

            <!-- 3D Luna-Gotchi -->
            <div class="tama-shell w-64 mx-auto text-center">
                <div class="bg-black p-4 rounded-xl mb-4">
                    <div id="luna-screen" class="bg-green-200 h-24 rounded border-4 border-gray-600 flex items-center justify-center text-black text-4xl">🐱</div>
                </div>
                <div class="flex justify-center gap-4">
                    <button onclick="feedLuna()" class="bg-white text-black p-3 rounded-full">🍖</button>
                    <button onclick="playLuna()" class="bg-white text-black p-3 rounded-full">🧶</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Persistence
        function syncData() {
            localStorage.setItem('magical-brief', document.getElementById('daily-sync').value);
            alert("✨ Sync Complete! ✨");
        }
        window.onload = () => document.getElementById('daily-sync').value = localStorage.getItem('magical-brief') || "";

        // Music
        function playMusic(index) {
            const urls = [
                "https://open.spotify.com/embed/album/2IevUWpkZ9KUcr6ZhtklE0",
                "https://open.spotify.com/embed/playlist/5QiMvqbV1bZschvqV3tPs0",
                "https://open.spotify.com/embed/album/3hzUq786dmch2KTVixU9Tb"
            ];
            document.getElementById('spotify-player').src = urls[index];
        }

        // Luna
        function feedLuna() { alert("Luna ate! 🍖"); }
        function playLuna() { alert("Luna is happy! 🧶"); }

        // Fairy Dust
        document.addEventListener('mousemove', e => {
            const dust = document.createElement('div');
            dust.className = 'fairy-dust';
            dust.style.left = e.pageX + 'px';
            dust.style.top = e.pageY + 'px';
            document.body.appendChild(dust);
            setTimeout(() => dust.remove(), 1000);
        });
    </script>
    <style>.fairy-dust { position: absolute; background: gold; width: 4px; height: 4px; border-radius: 50%; pointer-events: none; }</style>
</body>
</html>
