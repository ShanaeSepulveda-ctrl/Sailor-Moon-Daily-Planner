<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical Room & Y2K Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sm-pink: #ffb6c1;
            --sm-hotpink: #ff69b4;
            --sm-blue: #191970;
            --sm-yellow: #ffd700;
            --sm-purple: #9370db;
            --pda-silver: #e0e0e0;
        }

        body {
            margin: 0;
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #2b1055 0%, #752273 50%, #ffb6c1 100%);
            min-height: 100vh;
            color: #4a4a4a;
            overflow-x: hidden;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path d="M12 2L15 9H22L16 14L18 21L12 17L6 21L8 14L2 9H9L12 2Z" fill="%23FF69B4" stroke="%23FFF" stroke-width="1"/></svg>'), auto;
        }

        button, a, input, .cursor-pointer, .vinyl-disk, .star-checkbox {
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path d="M12 2L15 9H22L16 14L18 21L12 17L6 21L8 14L2 9H9L12 2Z" fill="%23FFD700" stroke="%23FFF" stroke-width="1"/></svg>'), pointer !important;
        }

        .fairy-dust {
            position: fixed;
            pointer-events: none;
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px 2px #fff, 0 0 20px 5px var(--sm-hotpink);
            z-index: 9999;
            animation: fallAndFade 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes fallAndFade {
            0% { opacity: 1; transform: scale(1) translateY(0) rotate(0deg); }
            100% { opacity: 0; transform: scale(0.2) translateY(50px) rotate(180deg); }
        }

        .fairy-lights {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            display: flex;
            justify-content: space-around;
            padding: 0;
            margin: 0;
            list-style: none;
            z-index: 0;
            pointer-events: none;
        }

        .fairy-lights li {
            position: relative;
            width: 12px;
            height: 20px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            background: #fff;
            animation: glow 2s infinite alternate;
        }
        
        .fairy-lights li::before {
            content: '';
            position: absolute;
            top: -5px;
            left: 4px;
            width: 4px;
            height: 5px;
            background: #333;
            border-radius: 2px;
        }

        .fairy-lights li:nth-child(odd) { animation-duration: 1.5s; background: var(--sm-yellow); box-shadow: 0 0 15px 5px var(--sm-yellow); }
        .fairy-lights li:nth-child(even) { animation-duration: 2.2s; background: #ffb6c1; box-shadow: 0 0 15px 5px #ffb6c1; }

        @keyframes glow {
            0% { opacity: 0.5; filter: brightness(1); }
            100% { opacity: 1; filter: brightness(1.5); }
        }

        .poster {
            position: absolute;
            background: white;
            padding: 10px 10px 30px 10px;
            box-shadow: 2px 5px 15px rgba(0,0,0,0.4);
            border-radius: 2px;
            z-index: 1;
            transition: transform 0.3s;
        }
        .poster:hover { transform: scale(1.05) rotate(0deg) !important; z-index: 20; }
        .poster img { width: 120px; height: 120px; object-fit: cover; border: 1px solid #eee; }
        .poster-caption { font-family: 'VT323', monospace; text-align: center; margin-top: 5px; font-size: 1.2rem; color: #333; }
        .tape {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%) rotate(-5deg);
            width: 40px;
            height: 15px;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(0,0,0,0.1);
        }

        .record-player-3d {
            background: linear-gradient(145deg, #ffe4e1, #ffb6c1);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.3), inset 2px 2px 5px rgba(255,255,255,0.8);
            border: 3px solid #ff69b4;
        }

        .platter-3d {
            width: 200px;
            height: 200px;
            background: #ddd;
            border-radius: 50%;
            margin: 0 auto 20px auto;
            position: relative;
            box-shadow: inset 5px 5px 15px rgba(0,0,0,0.2), 0 10px 15px rgba(0,0,0,0.4);
            transform: perspective(600px) rotateX(15deg);
            transform-style: preserve-3d;
            display: flex; justify-content: center; align-items: center;
        }

        .active-record {
            width: 90%; height: 90%;
            background: repeating-radial-gradient(#111, #111 4px, #222 5px, #222 6px);
            border-radius: 50%;
            transition: all 0.5s ease;
        }
        .active-record.spin { animation: spinRecord 2s linear infinite; }
        @keyframes spinRecord { 100% { transform: rotate(360deg); } }

        .record-label {
            width: 35%; height: 35%;
            background: var(--sm-hotpink);
            border-radius: 50%;
            border: 2px solid var(--sm-yellow);
        }

        .y2k-pda {
            background: linear-gradient(145deg, var(--pda-silver), #ffffff);
            border-radius: 40px;
            padding: 20px 15px 30px 15px;
            box-shadow: 20px 20px 40px rgba(0,0,0,0.5), inset 5px 5px 15px rgba(255,255,255,1);
            border: 4px solid #b0b0b0;
            width: 100%;
            min-height: 700px;
        }

        .pda-screen {
            background: rgba(255, 255, 255, 0.85);
            border: 4px solid #888;
            border-radius: 20px;
            padding: 15px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .title-font { font-family: 'Fredoka One', cursive; color: var(--sm-blue); text-shadow: 2px 2px 0px var(--sm-pink); }
        
        .star-checkbox {
            appearance: none;
            width: 30px; height: 30px;
            background-color: #fff; border: 3px solid #ccc; border-radius: 50%;
        }
        .star-checkbox:checked { background-color: var(--sm-yellow); border-color: var(--sm-yellow); }
        .star-checkbox:checked::after { content: '⭐'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        .tamagotchi-3d {
            background: radial-gradient(ellipse at top left, #ff99cc, #ff1493);
            border: 8px solid #ff69b4;
            border-radius: 40% 40% 50% 50% / 55% 55% 45% 45%;
            padding: 35px 25px 25px 25px;
        }
        .tama-screen {
            background: #8b9a46;
            border: 6px solid #444;
            border-radius: 20px;
            aspect-ratio: 1 / 1;
            font-family: 'Press Start 2P', monospace;
            color: #111;
            display: flex; flex-direction: column; justify-content: space-between; padding: 10px;
        }
        .tama-btn {
            width: 45px; height: 35px;
            background: #fff;
            border-radius: 50% 50% 10% 10%;
            border-bottom: 6px solid #ccc;
        }
    </style>
</head>
<body class="py-10 px-4 md:px-8 relative">

    <ul class="fairy-lights">
        <li></li><li></li><li></li><li></li><li></li><li></li><li></li><li></li><li></li><li></li><li></li><li></li>
    </ul>

    <div class="hidden lg:block">
        <!-- HOW TO UPDATE IMAGES: Change the 'src' link in the <img> tags below to your own photo links! -->
        <div class="poster" style="top: 15%; left: 3%; transform: rotate(-8deg);">
            <div class="tape"></div>
            <img src="https://placehold.co/150x150/ffb6c1/ffffff?text=BFFs" alt="Friends">
            <div class="poster-caption">Squad ✨</div>
        </div>
        <div class="poster" style="top: 45%; left: 6%; transform: rotate(5deg);">
            <div class="tape"></div>
            <img src="https://placehold.co/150x150/87ceeb/ffffff?text=Crush" alt="Crush">
            <div class="poster-caption">T.M. 🌹</div>
        </div>
        <div class="poster" style="top: 20%; right: 4%; transform: rotate(6deg);">
            <div class="tape"></div>
            <img src="https://placehold.co/150x150/9370db/ffffff?text=Goals" alt="Goals">
            <div class="poster-caption">Goals 🗼</div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto flex flex-col lg:flex-row gap-10 items-start justify-center relative z-10 mt-8">
        
        <div class="flex flex-col gap-10 w-full lg:w-1/3 z-20">
            <div class="record-player-3d">
                <h2 class="text-center font-['Fredoka_One'] text-white text-2xl mb-4 drop-shadow-md">🎶 Moon Melody</h2>
                
                <div class="flex justify-center gap-4 mb-4">
                    <button class="bg-pink-200 p-2 rounded-full border-2 border-pink-400" onclick="changeRecord(0)">Disk 1</button>
                    <button class="bg-blue-200 p-2 rounded-full border-2 border-blue-400" onclick="changeRecord(1)">Disk 2</button>
                    <button class="bg-yellow-200 p-2 rounded-full border-2 border-yellow-400" onclick="changeRecord(2)">Disk 3</button>
                </div>

                <div class="platter-3d" id="turntable">
                    <div class="active-record" id="active-record">
                        <div class="record-label mx-auto mt-auto mb-auto">🌙</div>
                    </div>
                </div>

                <div class="w-full rounded-xl overflow-hidden shadow-lg border-2 border-pink-300">
                    <iframe id="spotify-iframe" src="https://open.spotify.com/embed/album/2IevUWpkZ9KUcr6ZhtklE0?utm_source=generator&si=06243e0d201747c2" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
                </div>
            </div>

            <div class="tamagotchi-3d w-full max-w-[320px] mx-auto">
                <div class="tama-screen">
                    <div class="flex justify-between w-full pixel-text mt-1">
                        <span>HP:<span id="luna-hp">♥♥♥</span></span>
                    </div>
                    <div class="flex-1 flex items-center justify-center">
                        <svg id="luna-sprite" viewBox="0 0 100 100" class="w-24 h-24">
                            <ellipse cx="50" cy="55" rx="45" ry="38" fill="#111"/> 
                            <path d="M50 25 A 6 6 0 1 1 49.9 25.1 A 7 7 0 1 0 50 25" fill="#8b9a46"/>
                            <ellipse cx="28" cy="55" rx="9" ry="14" fill="#8b9a46"/>
                            <ellipse cx="72" cy="55" rx="9" ry="14" fill="#8b9a46"/>
                        </svg>
                    </div>
                    <div id="luna-status" class="pixel-text text-center mb-1">HAPPY!</div>
                </div>
                <div class="flex justify-between gap-4 mt-4 w-full">
                    <button onclick="feedLuna()" class="tama-btn">🍙</button>
                    <button onclick="playLuna()" class="tama-btn">✨</button>
                </div>
            </div>
        </div>

        <div class="y2k-pda w-full lg:w-2/3 z-20">
            <div class="pda-screen">
                <h1 class="title-font text-3xl mb-4 text-center">🌙 Usagi's Missions ✨</h1>
                <div id="task-list" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        // Playlist logic
        const playlists = [
            "https://open.spotify.com/embed/album/2IevUWpkZ9KUcr6ZhtklE0?utm_source=generator&si=06243e0d201747c2",
            "https://open.spotify.com/embed/playlist/5QiMvqbV1bZschvqV3tPs0?utm_source=generator&si=a97ee011156b4c95",
            "https://open.spotify.com/embed/album/3hzUq786dmch2KTVixU9Tb?utm_source=generator&si=2b196797add84c6b"
        ];
        
        function changeRecord(index) {
            const iframe = document.getElementById('spotify-iframe');
            const record = document.getElementById('active-record');
            record.classList.remove('spin');
            setTimeout(() => {
                iframe.src = playlists[index];
                record.classList.add('spin');
            }, 100);
        }

        // Luna Logic
        let lunaStats = { hunger: 100, happiness: 100 };
        function updateLunaUI() {
            document.getElementById('luna-hp').innerText = lunaStats.happiness > 60 ? '♥♥♥' : '♥';
        }
        function feedLuna() { lunaStats.hunger = 100; updateLunaUI(); }
        function playLuna() { lunaStats.happiness = 100; updateLunaUI(); }

        // Planner Logic
        const tasks = [
            { id: 1, title: "Submit Klaus's Health Appraisal", desc: "For Bennett Preschool.", completed: false },
            { id: 2, title: "Book NY Return Flights", desc: "For August 20th trip.", completed: false }
        ];

        function renderTasks() {
            const list = document.getElementById('task-list');
            list.innerHTML = tasks.map(t => `
                <div class="task-item p-3 flex items-center gap-3">
                    <input type="checkbox" class="star-checkbox" ${t.completed ? 'checked' : ''} onchange="toggleTask(${t.id})">
                    <div>
                        <div class="font-bold">${t.title}</div>
                        <div class="text-xs text-gray-500">${t.desc}</div>
                    </div>
                </div>
            `).join('');
        }
        function toggleTask(id) { 
            tasks.find(t => t.id === id).completed = !tasks.find(t => t.id === id).completed;
            renderTasks();
        }
        renderTasks();
    </script>
</body>
</html>
