<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Magical Y2K Room</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --y2k-pink: #ff99cc; --y2k-blue: #a0c4ff; --y2k-purple: #c499ff; }
        body { background: radial-gradient(circle at center, #2b1055, #111); min-height: 100vh; color: #fff; font-family: 'VT323', monospace; cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path d="M12 2L15 9H22L16 14L18 21L12 17L6 21L8 14L2 9H9L12 2Z" fill="%23FFD700" stroke="%23FFF" stroke-width="1"/></svg>'), auto; overflow-x: hidden; }
        
        /* 3D Boombox Styles */
        .boombox { transform-style: preserve-3d; background: #333; padding: 20px; border-radius: 20px; border: 8px solid #555; box-shadow: 10px 10px 0 #000; }
        .cassette { width: 100px; height: 60px; background: #ddd; border-radius: 5px; cursor: pointer; transition: transform 0.2s; }
        .cassette:hover { transform: translateY(-5px); }
        
        /* Tamagotchi Shell */
        .tama-shell { background: var(--y2k-pink); border-radius: 30px; border: 6px solid #ff6699; box-shadow: 0 10px 20px rgba(0,0,0,0.5); padding: 20px; }
        
        /* Gameboy */
        .gameboy { background: #999; width: 160px; height: 250px; border-radius: 10px 10px 50px 10px; border: 4px solid #333; padding: 15px; }
        
        /* Planner */
        .pda-frame { background: #111; border: 8px solid #333; border-radius: 20px; padding: 15px; box-shadow: 5px 5px 15px rgba(0,0,0,0.5); height: 500px; }
        
        .sparkle { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="flex flex-wrap justify-center gap-10">
        
        <!-- Left Side: Room Decor & Tech -->
        <div class="flex flex-col gap-6 w-full lg:w-80">
            
            <!-- Shelf Decor -->
            <div class="bg-purple-900/30 p-4 rounded-xl border border-purple-500 flex justify-around">
                <div title="Furby" class="text-4xl">🌈✨</div>
                <div title="Troll Doll" class="text-4xl">💎</div>
                <div title="Beanie Baby" class="text-4xl">🧸</div>
            </div>

            <!-- Boombox -->
            <div class="boombox">
                <h2 class="text-center text-sm mb-2 font-[Press_Start_2P]">BOOMBOX</h2>
                <div class="flex gap-2 justify-center mb-4">
                    <div class="cassette bg-blue-500" onclick="playMusic(0)"></div>
                    <div class="cassette bg-pink-500" onclick="playMusic(1)"></div>
                    <div class="cassette bg-yellow-500" onclick="playMusic(2)"></div>
                </div>
                <iframe id="spotify-player" style="border-radius:12px" src="https://open.spotify.com/embed/album/2IevUWpkZ9KUcr6ZhtklE0" width="100%" height="80" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
            </div>

            <!-- Luna-Gotchi -->
            <div class="tama-shell">
                <div id="tama-screen" class="bg-green-300 w-full h-32 rounded-lg border-4 border-black p-2 font-[Press_Start_2P] text-black text-[10px]">
                    LUNA: <span id="luna-msg">Meow!</span><br>
                    <div id="stats" class="mt-2">HP: ♥♥♥ | JOY: ☺☺</div>
                </div>
                <div class="flex justify-between mt-4">
                    <button onclick="feedLuna()" class="bg-black text-white p-2 rounded-full w-12 h-12 text-lg">🍖</button>
                    <button onclick="playLuna()" class="bg-black text-white p-2 rounded-full w-12 h-12 text-lg">🧶</button>
                </div>
            </div>

            <!-- Gameboy -->
            <div class="gameboy mx-auto">
                <canvas id="game-canvas" width="120" height="120" class="bg-green-700 w-full h-32 mb-4"></canvas>
                <div class="flex justify-center gap-4">
                    <button onclick="startGame()" class="bg-red-600 w-10 h-10 rounded-full shadow-lg border-b-4 border-red-900"></button>
                    <button onclick="resetGame()" class="bg-blue-600 w-10 h-10 rounded-full shadow-lg border-b-4 border-blue-900"></button>
                </div>
            </div>
        </div>

        <!-- Right Side: PDA Planner -->
        <div class="pda-frame w-full lg:w-96">
            <h1 class="text-pink-300 font-[Press_Start_2P] text-xs text-center mb-4">MOON PLANNER v1.0</h1>
            <textarea id="daily-brief" class="w-full h-40 bg-black text-green-400 font-[VT323] p-2 border border-green-900 text-sm" placeholder="Paste your daily brief here..."></textarea>
            <button onclick="saveBrief()" class="w-full bg-pink-600 hover:bg-pink-500 text-white p-2 mt-2 rounded">SYNC TO DEVICE</button>
            
            <div id="tasks" class="mt-6 space-y-2 overflow-y-auto max-h-60">
                <!-- Planner Tasks -->
            </div>
        </div>
    </div>

    <script>
        // Music Player
        function playMusic(index) {
            const player = document.getElementById('spotify-player');
            const urls = [
                "https://open.spotify.com/embed/album/2IevUWpkZ9KUcr6ZhtklE0",
                "https://open.spotify.com/embed/playlist/5QiMvqbV1bZschvqV3tPs0",
                "https://open.spotify.com/embed/album/3hzUq786dmch2KTVixU9Tb"
            ];
            player.src = urls[index];
        }

        // Planner Sync
        function saveBrief() {
            const text = document.getElementById('daily-brief').value;
            localStorage.setItem('magical-brief', text);
            alert('Synced to your PDA!');
        }

        window.onload = () => {
            document.getElementById('daily-brief').value = localStorage.getItem('magical-brief') || "";
        }

        // Luna Game Logic
        let luna = { joy: 5, hunger: 5 };
        function feedLuna() { luna.hunger = Math.min(luna.hunger + 2, 5); updateTama(); }
        function playLuna() { luna.joy = Math.min(luna.joy + 2, 5); updateTama(); }
        function updateTama() {
            document.getElementById('stats').innerText = `HP: ${'♥'.repeat(luna.hunger)} | JOY: ${'☺'.repeat(luna.joy)}`;
            document.getElementById('luna-msg').innerText = luna.hunger < 2 ? "Feed me!" : "Purrr...";
        }

        // Mini Game Logic (Snake)
        let canvas = document.getElementById('game-canvas');
        let ctx = canvas.getContext('2d');
        function startGame() {
            ctx.fillStyle = "black";
            ctx.fillRect(50, 50, 20, 20); // Placeholder
        }
        function resetGame() { ctx.clearRect(0,0,120,120); }
    </script>
</body>
</html>
