<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌙 My Magical Y2K Sanctuary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sm-pink: #ffb6c1;
            --sm-hotpink: #ff69b4;
            --cosmic-dark: #0f0c29;
            --cosmic-mid: #302b63;
        }

        body {
            margin: 0;
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #fff;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path d="M12 2L15 9H22L16 14L18 21L12 17L6 21L8 14L2 9H9L12 2Z" fill="%23FF69B4" stroke="%23FFF" stroke-width="1.5"/></svg>'), auto;
        }

        /* Pink Matrix Background */
        #matrix-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; opacity: 0.3; pointer-events: none; }

        /* The 3D-ish Tamagotchi Buttons */
        .tama-btn {
            background: linear-gradient(145deg, #ffffff, #e0e0e0);
            border-radius: 50%;
            width: 50px; height: 50px;
            box-shadow: 5px 5px 10px #bebebe, -5px -5px 10px #ffffff;
            transition: all 0.1s;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.5rem;
        }
        .tama-btn:active { box-shadow: inset 3px 3px 6px #bebebe, inset -3px -3px 6px #ffffff; transform: scale(0.95); }

        /* Glossy Tamagotchi Shell */
        .tamagotchi-3d {
            background: radial-gradient(circle at 30% 30%, #ff99cc, #ff1493);
            border-radius: 50px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.4);
            border: 8px solid #ff69b4;
        }

        /* Phygital Modal */
        .phygital-modal {
            background: rgba(15, 12, 41, 0.95);
            backdrop-filter: blur(20px);
            border: 4px solid var(--sm-hotpink);
            border-radius: 30px;
        }

        /* TV Screen Effect */
        .tv-screen-container { 
            background: #111; border: 8px solid #333; 
            box-shadow: inset 0 0 20px #000, 0 0 15px rgba(0,0,0,0.5); 
            overflow: hidden;
        }
        .tv-screen-container::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; 
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 3px, 3px 100%; pointer-events: none;
        }
    </style>
</head>
<body class="py-10 px-4">

    <canvas id="matrix-canvas"></canvas>

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-12 items-start relative z-10">
        
        <!-- LEFT: Luna & Art -->
        <div class="flex flex-col gap-10">
            <!-- Luna-Gotchi 3.0 -->
            <div class="tamagotchi-3d max-w-[320px] mx-auto w-full">
                <div class="tama-screen bg-[#8b9a46] border-4 border-black rounded-xl p-4 aspect-square mb-6 flex flex-col justify-between">
                    <div class="text-black font-['Press_Start_2P'] text-[10px]">HP:<span id="luna-hp">♥♥♥</span></div>
                    <div class="flex-1 flex items-center justify-center">
                        <svg id="luna-sprite" viewBox="0 0 100 100" class="w-24 h-24">
                            <ellipse cx="50" cy="55" rx="45" ry="38" fill="#111"/> 
                            <path d="M50 25 A 6 6 0 1 1 49.9 25.1 A 7 7 0 1 0 50 25" fill="#8b9a46"/>
                            <ellipse cx="28" cy="55" rx="9" ry="14" fill="#8b9a46"/><ellipse cx="72" cy="55" rx="9" ry="14" fill="#8b9a46"/>
                            <path id="mouth" d="M45 76 Q50 82 55 76" stroke="#8b9a46" stroke-width="2" fill="none"/>
                        </svg>
                    </div>
                    <div id="luna-status" class="text-black font-['Press_Start_2P'] text-[10px] text-center">HAPPY!</div>
                </div>
                <div class="flex justify-center gap-4">
                    <button onclick="feedLuna()" class="tama-btn">🍙</button>
                    <button onclick="playLuna()" class="tama-btn">✨</button>
                    <button onclick="cleanLuna()" class="tama-btn">🧹</button>
                    <button onclick="sleepLuna()" class="tama-btn">💤</button>
                    <button onclick="quantumLuna()" class="tama-btn" style="background: pink;">🌌</button>
                </div>
            </div>

            <!-- Procreate Lite -->
            <div class="bg-white/10 p-6 rounded-3xl border border-white/20 backdrop-blur-md">
                <h2 class="text-xl font-['Fredoka_One'] mb-4">Cosmic Canvas 🎨</h2>
                <div class="canvas-wrapper bg-white rounded-xl overflow-hidden mb-4 h-64 relative border-4 border-pink-400">
                    <canvas id="art-canvas" class="w-full h-full cursor-crosshair"></canvas>
                </div>
                <button onclick="makePhygital()" class="w-full bg-gradient-to-r from-blue-500 to-purple-600 p-3 rounded-full font-bold">Phygital 3D Portal 🌌</button>
            </div>
        </div>

        <!-- RIGHT: TV & Music -->
        <div class="flex flex-col gap-10">
            <!-- Retro TV -->
            <div class="tv-screen-container relative rounded-3xl overflow-hidden aspect-video">
                <iframe class="w-full h-full" src="https://www.youtube.com/embed/vCCamwjcumM" allowfullscreen></iframe>
            </div>

            <!-- CD Player -->
            <div class="bg-pink-400/20 p-8 rounded-3xl border-4 border-pink-300">
                <div class="cd-rack flex justify-center gap-4 mb-6">
                    <div class="w-12 h-12 rounded-full bg-pink-200 cursor-pointer" onclick="changeCD(0)"></div>
                    <div class="w-12 h-12 rounded-full bg-blue-200 cursor-pointer" onclick="changeCD(1)"></div>
                    <div class="w-12 h-12 rounded-full bg-yellow-200 cursor-pointer" onclick="changeCD(2)"></div>
                </div>
                <iframe id="spotify-iframe" src="https://open.spotify.com/embed/playlist/0vvXsWCC9xrXsKd4Zsnsnis" width="100%" height="152" frameBorder="0" allow="encrypted-media"></iframe>
            </div>
        </div>
    </div>

    <!-- Phygital Modal -->
    <div id="phygital-modal" class="phygital-modal hidden fixed top-10 left-10 right-10 bottom-10 z-50 p-10 flex flex-col items-center justify-center">
        <h2 class="text-3xl font-bold mb-4">Your Portal to 3D Art</h2>
        <div id="three-container" class="w-64 h-64 bg-black rounded-lg"></div>
        <img id="qr-code" class="mt-4 w-40 h-40 bg-white p-2" src="" alt="QR">
        <button onclick="closePhygital()" class="mt-6 bg-red-500 px-6 py-2 rounded-full">Close Portal</button>
    </div>

    <script>
        // Matrix Rain
        const mCanvas = document.getElementById('matrix-canvas');
        const ctx = mCanvas.getContext('2d');
        let width = mCanvas.width = window.innerWidth;
        let height = mCanvas.height = window.innerHeight;
        let drops = Array(Math.floor(width/20)).fill(1);
        setInterval(() => {
            ctx.fillStyle = 'rgba(15, 12, 41, 0.05)';
            ctx.fillRect(0,0,width,height);
            ctx.fillStyle = '#ffb6c1';
            drops.forEach((d, i) => {
                ctx.fillText('✧', i*20, d*20);
                drops[i] = (d*20 > height && Math.random() > 0.975) ? 0 : d + 1;
            });
        }, 50);

        // Art Canvas Logic
        const canvas = document.getElementById('art-canvas');
        const aCtx = canvas.getContext('2d');
        let drawing = false;
        canvas.onmousedown = () => drawing = true;
        canvas.onmouseup = () => drawing = false;
        canvas.onmousemove = e => {
            if(!drawing) return;
            const rect = canvas.getBoundingClientRect();
            aCtx.fillStyle = '#ff69b4';
            aCtx.fillRect(e.clientX - rect.left, e.clientY - rect.top, 5, 5);
        };

        // Phygital Engine placeholder
        function makePhygital() {
            document.getElementById('phygital-modal').classList.remove('hidden');
            const url = encodeURIComponent(window.location.href);
            document.getElementById('qr-code').src = `https://api.qrserver.com/v1/create-qr-code/?data=${url}`;
            // (Three.js init would go here for the crystal)
        }
        function closePhygital() { document.getElementById('phygital-modal').classList.add('hidden'); }
        function changeCD(url) { document.getElementById('spotify-iframe').src = url; }
    </script>
</body>
</html>
